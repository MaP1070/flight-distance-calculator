<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Flight Distance Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Flight Distance Calculator</h1>

<input id="from" placeholder="Origin airport (ex: LIM)">
<div id="from-results"></div>
<input id="to" placeholder="Destination airport (ex: MAD)">
<div id="to-results"></div>

<button onclick="calculate()">Calculate</button>

<div id="container">
    <p id="Route"></p>
    <p id="Distance"></p>
    <p id="Time"></p> 
</div>

<script src="script.js"></script>

</body>

</html>
